<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Productor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* CONFIGURACIÓN DE IMPRESIÓN */
@media print {

    body * {
        visibility: hidden;
    }

    #printArea, #printArea * {
        visibility: visible;
    }

    #printArea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
    }

    @page {
        size: letter;
        margin: 2.54cm;
    }
}
</style>

</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Panel del Productor - AgroConecta Rural</span>
        <a href="index.html" class="btn btn-light">Cerrar sesión</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- FORMULARIO (NO SE IMPRIME) -->
    <div class="card p-4 shadow mb-4">
        <h4>Agregar Producto</h4>
        <form id="productForm">
            <div class="row g-3">

                <div class="col-md-3">
                    <input type="text" id="productName" class="form-control" placeholder="Nombre del producto" required>
                </div>

                <div class="col-md-2">
                    <select id="category" class="form-select" required>
                        <option value="">Categoría</option>
                        <option>Frutas</option>
                        <option>Verduras</option>
                        <option>Tubérculos</option>
                        <option>Granos</option>
                        <option>Lácteos</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <input type="number" id="quantity" class="form-control" placeholder="Cantidad" required>
                </div>

                <div class="col-md-2">
                    <select id="unit" class="form-select" required>
                        <option value="">Unidad</option>
                        <option value="kg">Kg</option>
                        <option value="g">Gramo</option>
                        <option value="unidad">Unidad</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <input type="number" id="price" class="form-control" placeholder="Precio por unidad (COP)" required>
                </div>

                <div class="col-md-1">
                    <button type="submit" class="btn btn-success w-100">+</button>
                </div>

            </div>
        </form>
    </div>

    <!-- ÁREA QUE SÍ SE IMPRIME -->
    <div id="printArea" class="card p-4 shadow">
        <h3 class="text-center mb-4">Inventario - AgroConecta Rural</h3>

        <div class="mb-3 text-end no-print">
            <button class="btn btn-primary" onclick="printInventory()">Imprimir</button>
            <button class="btn btn-danger" onclick="exportPDF()">Exportar PDF</button>
        </div>

        <table class="table table-bordered">
            <thead class="table-success">
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Unidad</th>
                    <th>Precio Unitario</th>
                    <th>Total</th>
                    <th class="no-print">Acción</th>
                </tr>
            </thead>
            <tbody id="productList"></tbody>
        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - AgroConecta Rural</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Panel del Productor</span>
        <a href="index.html" class="btn btn-light">Cerrar sesión</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-4 shadow mb-4">
        <h4>Agregar Producto</h4>
        <form id="productForm">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" id="productName" class="form-control" placeholder="Nombre del producto" required>
                </div>
                <div class="col-md-3">
                    <input type="number" id="productQuantity" class="form-control" placeholder="Cantidad" required>
                </div>
                <div class="col-md-3">
                    <input type="number" id="productPrice" class="form-control" placeholder="Precio" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Agregar</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-4 shadow">
        <h4>Inventario</h4>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="productList">
            </tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
